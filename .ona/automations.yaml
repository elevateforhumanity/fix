tasks:
  setup-env:
    name: Setup environment
    description: Assemble .env.local from secret chunks, or fall back to .env.example.
    command: |
      if [ ! -f .env.local ]; then
        # Reassemble from secret file chunks if they exist
        if [ -f .env_local_1.txt ] && [ -f .env_local_2.txt ] && [ -f .env_local_3.txt ]; then
          cat .env_local_1.txt .env_local_2.txt .env_local_3.txt > .env.local
          echo "Assembled .env.local from secret chunks"
        elif [ -f .env.example ]; then
          cp .env.example .env.local
          echo "Created .env.local from .env.example"
        else
          echo "No env source found, skipping"
        fi
      else
        echo ".env.local already exists"
      fi
    triggeredBy:
      - postDevcontainerStart

  install-deps:
    name: Install dependencies
    description: Enable corepack and install pnpm dependencies.
    command: |
      sudo corepack enable
      corepack prepare pnpm@10.28.2 --activate
      pnpm install
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - setup-env


services:
  dev-server:
    name: Dev Server
    description: Next.js development server with Turbopack on port 3000.
    commands:
      start: pnpm dev
      stop: kill $(lsof -ti:3000) 2>/dev/null || true
      ready: curl -sf http://localhost:3000
