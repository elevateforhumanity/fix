tasks:
  setup-env:
    name: Setup environment
    description: Copy .env.example to .env.local if it does not exist.
    command: |
      if [ ! -f .env.local ]; then
        if [ -f .env.example ]; then
          cp .env.example .env.local
          echo "Created .env.local from .env.example"
        else
          echo "No .env.example found, skipping"
        fi
      else
        echo ".env.local already exists"
      fi
    triggeredBy:
      - postDevcontainerStart

  install-deps:
    name: Install dependencies
    description: Enable corepack and install pnpm dependencies.
    command: |
      sudo corepack enable
      corepack prepare pnpm@10.28.2 --activate
      pnpm install
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - setup-env

services:
  dev-server:
    name: Dev Server
    description: Next.js development server with Turbopack on port 3000.
    commands:
      start: pnpm dev --turbopack
      ready: curl -f http://localhost:3000
