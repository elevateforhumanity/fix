name: lms-generator

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/programs/**'
      - 'scripts/test-generator-*.ts'
      - 'scripts/validate-lms-integrity.ts'
      - 'supabase/migrations/**'
      - '.github/workflows/lms-generator.yml'
  pull_request:
    paths:
      - 'lib/programs/**'
      - 'scripts/test-generator-*.ts'
      - 'scripts/validate-lms-integrity.ts'
      - 'supabase/migrations/**'
      - '.github/workflows/lms-generator.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run LMS generator tests
        run: pnpm lms:test:all
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MANAGEMENT_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}
