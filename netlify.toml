# ============================================
# SUPERSONIC DOMAIN (supersonicfastermoney.com)
# Serves Supersonic Fast Cash + VITA tax content from this domain.
# /tax/* and /supersonic-fast-cash/* both map through.
# HTTP naked → HTTPS www first, then path rules apply.
# ============================================

# HTTP → HTTPS canonicalization (must come first)
[[redirects]]
  from = "http://supersonicfastermoney.com/*"
  to = "https://www.supersonicfastermoney.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.supersonicfastermoney.com/*"
  to = "https://www.supersonicfastermoney.com/:splat"
  status = 301
  force = true

# Naked → www
[[redirects]]
  from = "https://supersonicfastermoney.com/*"
  to = "https://www.supersonicfastermoney.com/:splat"
  status = 301
  force = true

# VITA / tax pages — live at /tax/* on the main site
[[redirects]]
  from = "https://www.supersonicfastermoney.com/tax/*"
  to = "https://www.elevateforhumanity.org/tax/:splat"
  status = 200
  force = true

# Supersonic Fast Cash pages — live at /supersonic-fast-cash/* on the main site
