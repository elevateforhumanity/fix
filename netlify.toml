# Netlify Configuration - Elevate for Humanity
# Canonical domain: www.elevateforhumanity.org (with www)
# Admin domain: elevateconnectsdirectory.org (separate admin panel)

[build]
  command = "pnpm install && npx tsx scripts/ci-token-gate.ts && pnpm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=8192"
  NETLIFY_USE_PNPM = "true"
  # Disable secret scanning - NEXT_PUBLIC_* vars are intentionally public
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXTAUTH_URL"
  # Admin dev tools - enabled for all builds, production guards handle access
  ENABLE_ADMIN_DEVTOOLS = "true"
  # Skip browser binary downloads - reduces bundle size significantly
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force cache invalidation on HTML pages
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Allow caching for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =============================================================================
# SCHEDULED FUNCTIONS (Social Media Automation)
# =============================================================================

[functions]
  node_bundler = "esbuild"

# ___netlify-server-handler is the bundled SSR function powering Next.js on Netlify.
# Externalize heavy/native modules so they load from node_modules at runtime
# instead of being inlined into the handler zip (50 MB zipped limit).
[functions."___netlify-server-handler"]
  external_node_modules = [
    "tesseract.js",
    "tesseract.js-core",
    "sharp",
    "pdf-parse",
    "pdfkit",
    "pdf-lib",
    "jspdf",
    "jspdf-autotable",
    "@react-pdf/renderer",
    "@aws-sdk/client-s3",
    "@aws-sdk/s3-request-presigner",
    "pg",
    "openai",
    "stripe",
    "@stripe/stripe-js",
    "@stripe/react-stripe-js",
    "ioredis",
    "redis",
    "@upstash/redis",
    "socket.io",
    "socket.io-client",
    "@sendgrid/mail",
    "nodemailer",
    "@sentry/nextjs",
    "@sentry/node",
    "@sentry/core",
    "@opentelemetry/api",
    "@opentelemetry/sdk-node",
    "@opentelemetry/exporter-trace-otlp-http",
    "@opentelemetry/resources",
    "@opentelemetry/semantic-conventions",
    "puppeteer",
    "puppeteer-core",
    "playwright",
    "chromium-bidi",
  ]

# PDF export function - isolated bundle with PDF libraries
[functions."export-pdf"]
  external_node_modules = [
    "pdf-lib",
    "@pdf-lib/fontkit"
  ]

# OCR function - isolated bundle with Tesseract and Sharp
[functions."ocr-extract"]
  external_node_modules = [
    "tesseract.js",
    "sharp"
  ]

# Image optimization function - isolated bundle with Sharp
[functions."image-optimize"]
  external_node_modules = [
    "sharp"
  ]

# SFC: File return function
[functions."file-return"]
  external_node_modules = ["@supabase/supabase-js"]

# SFC: Refund tracking function (public, anon key only)
[functions."refund-tracking"]
  external_node_modules = ["@supabase/supabase-js"]

# Social Media Scheduler - DISABLED due to AWS Lambda 4KB env var limit
# TODO: Re-enable with reduced env vars or use background functions
# [functions."social-media-scheduler"]
#   schedule = "0 14,18,22 * * *"

