  from = "https://www.supersonicfastermoney.com/supersonic-fast-cash/*"
  to = "https://www.elevateforhumanity.org/supersonic-fast-cash/:splat"
  status = 200
  force = true

# API routes — must come before the catch-all so Stripe webhooks and other
# API calls reach the correct path on elevateforhumanity.org.
