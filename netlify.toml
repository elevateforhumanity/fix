  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/admin.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/about.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-cron.php"
  to = "/410.html"
  status = 410
  force = true
# Malformed typos bots hit

[[redirects]]
  from = "/xmrlpc.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-content/wp-conflg.php"
  to = "/410.html"
  status = 410
