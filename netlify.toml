# ROUTE REDIRECTS
# ============================================
# Canonical: NO trailing slashes (prevents 308 hops)

[[redirects]]
  from = "/wp-admin"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
