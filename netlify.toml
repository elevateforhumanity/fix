# Netlify Configuration - Elevate for Humanity
# Canonical domain: www.elevateforhumanity.org (with www)
# Admin domain: elevateconnectsdirectory.org (separate admin panel)

[build]
  # libxml2-utils provides xmllint, required for IRS MeF XSD validation.
  # Without it, schema-validator.ts returns XMLLINT_NOT_AVAILABLE and blocks all submissions.
  command = "corepack enable && pnpm install --no-frozen-lockfile && npx tsx scripts/ci-token-gate.ts && pnpm run audit:garbage && pnpm run audit:admin && pnpm run audit:dashboard && pnpm run build"
  # publish is intentionally omitted — @netlify/plugin-nextjs manages the output directory.
  # Setting publish = ".next" causes Turbopack to error: distDirRoot navigates outside projectPath.
  functions = "netlify/functions"

# Block preview and branch deployments from search engine indexing
[context.deploy-preview]
  [context.deploy-preview.environment]
    ROBOTS_NOINDEX = "true"

[context.branch-deploy]
  [context.branch-deploy.environment]
    ROBOTS_NOINDEX = "true"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=8192"
  NETLIFY_USE_PNPM = "true"
  # Disable secret scanning - NEXT_PUBLIC_* vars are intentionally public
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXTAUTH_URL"
  # Admin dev tools - enabled for all builds, production guards handle access
  ENABLE_ADMIN_DEVTOOLS = "true"
  # Skip browser binary downloads - reduces bundle size significantly
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"

# ---------------------------------------------------------------------------
# ENV VAR STRATEGY (Lambda 4 KB limit)
#
# AWS Lambda limits environment variables to 4 KB per function. Netlify
# injects ALL site env vars into every function, including the Next.js
# SSR handler. With 160+ vars this exceeds the limit and deploys fail.
#
# Solution: only 3 bootstrap vars stay in Netlify site settings:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#
# All other secrets live in the Supabase `app_secrets` table and are
# loaded at runtime via lib/secrets.ts → hydrateProcessEnv().
# The Next.js instrumentation hook (instrumentation.ts) calls this on
# server startup. Standalone Netlify functions use
# netlify/lib/secrets-standalone.ts.
#
# NEXT_PUBLIC_* vars needed at build time should be set with scope
# "Builds" in Netlify dashboard (not "Functions").
#
# To seed app_secrets: bash scripts/seed-app-secrets.sh > /tmp/seed.sql
# Then run in Supabase SQL Editor.
# ---------------------------------------------------------------------------

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CDN caching — pages cached 60s at edge, static assets cached 1 year
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=300"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Protected routes — never cache at CDN or browser
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/lms/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/student-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/staff-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/employer-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/mentor/*"
  [headers.values]
    Cache-Control = "private, no-store"

# =============================================================================
# SCHEDULED FUNCTIONS (Social Media Automation)
# =============================================================================

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "pg"
  ]

# Externalize heavy deps from the Next.js SSR handler to stay under 250MB zip limit
[functions."___netlify-server-handler"]
  external_node_modules = [
    # Google APIs (194MB alone)
    "googleapis",
    "google-auth-library",
    # Editor / terminal (75MB + 63MB — browser-only)
    "monaco-editor",
    "node-pty",
    # OCR / image processing
    "tesseract.js",
    "tesseract.js-core",
    "sharp",
    "@img/sharp-libvips-linux-x64",
    "@napi-rs/canvas",
    "@napi-rs/canvas-linux-x64-gnu",
    # PDF libraries
    "pdf-parse",
    "pdfkit",
    "pdf-lib",
    "pdfjs-dist",
    "jspdf",
    "jspdf-autotable",
    "@react-pdf/renderer",
    # Video (browser-only)
    "video.js",
    # AWS SDK
    "@aws-sdk/client-s3",
    "@aws-sdk/s3-request-presigner",
    # Database / cache
    "pg",
    "ioredis",
    "redis",
    "@upstash/redis",
    "@redis/client",
    # AI / payments
    "openai",
    "stripe",
    # Email
    "@sendgrid/mail",
    "nodemailer",
    # Observability
    "@sentry/nextjs",
    "@sentry/node",
    "@sentry/core",
    "@sentry/cli-linux-x64",
    "@opentelemetry/api",
    "@opentelemetry/sdk-node",
    "@opentelemetry/exporter-trace-otlp-http",
    "@opentelemetry/resources",
    "@opentelemetry/semantic-conventions",
    # Browser automation (not needed in SSR)
    "puppeteer",
    "puppeteer-core",
    "playwright",
    "playwright-core",
    "chromium-bidi",
    # DOM / test (not needed in SSR)
    "jsdom",
    "happy-dom",
    # Build tools (not needed at runtime)
    "typescript",
    "core-js",
    "prettier",
    "es-toolkit",
    # Sockets (not used in serverless)
    "socket.io",
    "socket.io-client",
  ]

# PDF export function - isolated bundle with PDF libraries
[functions."export-pdf"]
  external_node_modules = [
    "pdf-lib",
    "@pdf-lib/fontkit"
  ]

# OCR function - isolated bundle with Tesseract and Sharp
[functions."ocr-extract"]
  external_node_modules = [
    "tesseract.js",
    "sharp"
  ]

# Image optimization function - isolated bundle with Sharp
[functions."image-optimize"]
  external_node_modules = [
    "sharp"
  ]

# SFC: File return function
# @supabase/supabase-js bundled by esbuild — Lambda has no node_modules at runtime
[functions."file-return"]
  node_bundler = "esbuild"

# SFC: Refund tracking function (public, anon key only)
# @supabase/supabase-js bundled by esbuild — Lambda has no node_modules at runtime
[functions."refund-tracking"]
  node_bundler = "esbuild"

# Social Media Scheduler - can be re-enabled now that env vars are in
# Supabase app_secrets (no longer hits Lambda 4KB limit).
# [functions."social-media-scheduler"]
#   schedule = "0 14,18,22 * * *"

# Compliance expiration — weekly, Monday 3 AM ET
# Finds provider_compliance_artifacts expiring within 30 days and queues notifications.
# Requires CRON_SECRET env var in Netlify site settings.
# Testing center no-show enforcement — nightly 2 AM ET
# Marks missed confirmed bookings as no-show, creates $50 rescheduling fee holds.
# Requires CRON_SECRET env var.
[functions."cron-testing-no-show"]
  schedule = "0 7 * * *"

[functions."cron-compliance-expiration"]
  schedule = "0 8 * * 1"

# Onboarding reminder — weekly, Monday 9 AM ET
# Nudges providers with incomplete onboarding steps.
# Requires CRON_SECRET env var in Netlify site settings.
[functions."cron-onboarding-reminder"]
  schedule = "0 14 * * 1"

# IRS MeF ACK polling — every 5 minutes during filing season.
# Polls mef_submissions with status in (transmitting, pending_ack, transmitted).
# Requires CRON_SECRET and IRS_SOFTWARE_ID env vars.
# IRS does not push ACKs — transmitter must poll.
[functions."cron-poll-mef-acks"]
  schedule = "*/5 * * * *"

