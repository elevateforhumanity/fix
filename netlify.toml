# Netlify Configuration - Elevate for Humanity
# Canonical domain: www.elevateforhumanity.org (with www)
# Admin domain: elevateconnectsdirectory.org (separate admin panel)

[build]
  command = "pnpm install && npx tsx scripts/ci-token-gate.ts && node scripts/check-redirect-conflicts.mjs && node scripts/stamp-sw.mjs && NEXT_DISABLE_TURBOPACK=1 pnpm exec next build --webpack"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=8192"
  NEXT_DISABLE_SOURCEMAP = "1"
  NETLIFY_USE_PNPM = "true"
  # Disable secret scanning - NEXT_PUBLIC_* vars are intentionally public
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXTAUTH_URL"
  # Admin dev tools - enabled for all builds, production guards handle access
  ENABLE_ADMIN_DEVTOOLS = "true"
  # Skip browser binary downloads - reduces bundle size significantly
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CDN caching — pages cached 60s at edge, static assets cached 1 year
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=300"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Protected routes — never cache at CDN or browser
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/lms/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/student-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/staff-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/employer-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/mentor/*"
  [headers.values]
    Cache-Control = "private, no-store"

# =============================================================================
# SCHEDULED FUNCTIONS (Social Media Automation)
# =============================================================================

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "pg"
  ]

# Externalize heavy deps from the Next.js SSR handler to stay under 50MB zip limit
[functions."___netlify-server-handler"]
  external_node_modules = [
    "tesseract.js",
    "tesseract.js-core",
    "sharp",
    "pdf-parse",
    "pdfkit",
    "pdf-lib",
    "jspdf",
    "jspdf-autotable",
    "@react-pdf/renderer",
    "@aws-sdk/client-s3",
    "@aws-sdk/s3-request-presigner",
    "pg",
    "openai",
    "stripe",
    "ioredis",
    "redis",
    "@upstash/redis",
    "socket.io",
    "socket.io-client",
    "@sendgrid/mail",
    "nodemailer",
    "@sentry/nextjs",
    "@sentry/node",
    "@sentry/core",
    "@opentelemetry/api",
    "@opentelemetry/sdk-node",
    "@opentelemetry/exporter-trace-otlp-http",
    "@opentelemetry/resources",
    "@opentelemetry/semantic-conventions",
    "puppeteer",
    "puppeteer-core",
    "playwright",
    "chromium-bidi",
    "jsdom",
    "typescript",
    "core-js",
  ]

# PDF export function - isolated bundle with PDF libraries
[functions."export-pdf"]
  external_node_modules = [
    "pdf-lib",
    "@pdf-lib/fontkit"
  ]

# OCR function - isolated bundle with Tesseract and Sharp
[functions."ocr-extract"]
  external_node_modules = [
    "tesseract.js",
    "sharp"
  ]

# Image optimization function - isolated bundle with Sharp
[functions."image-optimize"]
  external_node_modules = [
    "sharp"
  ]

# SFC: File return function
[functions."file-return"]
  external_node_modules = ["@supabase/supabase-js"]

# SFC: Refund tracking function (public, anon key only)
[functions."refund-tracking"]
  external_node_modules = ["@supabase/supabase-js"]

# Social Media Scheduler - DISABLED due to AWS Lambda 4KB env var limit
# TODO: Re-enable with reduced env vars or use background functions
# [functions."social-media-scheduler"]
#   schedule = "0 14,18,22 * * *"

# ============================================
# ADMIN DOMAIN (www.elevateconnectsdirectory.org)
# Rewrites admin domain to /admin dashboard
# ============================================

[[redirects]]
  from = "https://www.elevateconnectsdirectory.org"
  to = "https://www.elevateforhumanity.org/admin"
  status = 200
  force = true

[[redirects]]
  from = "https://www.elevateconnectsdirectory.org/*"
  to = "https://www.elevateforhumanity.org/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://elevateconnectsdirectory.org/*"
  to = "https://www.elevateconnectsdirectory.org/:splat"
  status = 301
  force = true

# ============================================
# LMS DOMAIN (elevateforhumanityeducation.com)
# Do NOT redirect - handled by middleware -> /student-portal
# ============================================

# ============================================
# SUPERSONIC DOMAIN (supersonicfastermoney.com)
# Do NOT redirect - handled by middleware -> /supersonic-fast-cash
# ============================================

# ============================================
# CANONICAL DOMAIN REDIRECTS (301 = permanent)
# All traffic funnels to www.elevateforhumanity.org
# ============================================

# Naked org -> www org (canonical)

[[redirects]]
  from = "https://elevateforhumanity.org/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true
# HTTP -> HTTPS

[[redirects]]
  from = "http://elevateforhumanity.org/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.elevateforhumanity.org/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true
# Old .institute domain -> canonical .org (preserves path + query)

[[redirects]]
  from = "https://www.elevateforhumanity.institute/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://elevateforhumanity.institute/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.elevateforhumanity.institute/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://elevateforhumanity.institute/*"
  to = "https://www.elevateforhumanity.org/:splat"
  status = 301
  force = true
# ============================================
# PORTAL URL CANONICALIZATION
# Collapse duplicate portal paths to one canonical URL each
# ============================================

[[redirects]]
  from = "/api/pdf/export"
  to = "/.netlify/functions/export-pdf"
  status = 200
  force = true
# OCR extraction - routed to dedicated Netlify function

[[redirects]]
  from = "/api/ocr/extract"
  to = "/.netlify/functions/ocr-extract"
  status = 200
  force = true
# Image optimization - routed to dedicated Netlify function

[[redirects]]
  from = "/api/image/optimize"
  to = "/.netlify/functions/image-optimize"
  status = 200
  force = true
# SFC: File tax return - routed to dedicated Netlify function

[[redirects]]
  from = "/api/file-return"
  to = "/.netlify/functions/file-return"
  status = 200
  force = true
# SFC: Refund tracking (public, anon key) - routed to dedicated Netlify function

[[redirects]]
  from = "/api/refund-tracking"
  to = "/.netlify/functions/refund-tracking"
  status = 200
  force = true
# ============================================
# ROUTE REDIRECTS
# ============================================
# Canonical: NO trailing slashes (prevents 308 hops)

[[redirects]]
  from = "/wp-admin"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/cgi-bin/*"
  to = "/410.html"
  status = 410
